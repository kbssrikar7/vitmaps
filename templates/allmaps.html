<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fleet Tracking</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
html, body {
    height: 100%;
    margin: 0;
    background: #eef2f6;
}

/* OUTER WRAPPER */
.page-wrapper {
    height: 100vh; /* full viewport height */
    padding: clamp(8px, 1.5vw, 20px);
    box-sizing: border-box;
}

/* CARD STYLE MAP */
.map-card {
    height: 100%;
    width: 100%;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    background: white;
    box-shadow: 0 6px 25px rgba(0,0,0,0.15);
}

/* MAP HOLDER */
#map-wrapper {
    height: 100%;
    width: 100%;
}

/* FORCE FOLIUM FULL SIZE */
#map-wrapper iframe {
    width: 100% !important;
    height: 100vh !important; /* 🔥 full viewport height */
    border: none;
    display: block;
}

/* LOGO */
.logo {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 1000;
}

.logo img {
    height: clamp(30px, 4vw, 50px);
}

/* BUTTONS */
.top-buttons {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 1000;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    max-width: 85%;
    justify-content: flex-end;
}

.top-buttons button {
    border: none;
    border-radius: 20px;
    padding: 6px 12px;
    font-size: clamp(11px, 2vw, 14px);
    background: white;
    box-shadow: 0 3px 8px rgba(0,0,0,0.2);
    cursor: pointer;
}

.top-buttons button:hover {
    background: #007bff;
    color: white;
}

/* 📱 MOBILE OPTIMIZATION */
@media (max-width: 768px) {
    .page-wrapper {
        height: 100vh;
        padding: 6px;
    }

    .map-card {
        height: 100%;
    }

    .top-buttons {
        top: auto;
        bottom: 70px; /* space for zoom control */
        right: 12px;
        flex-direction: column;
        align-items: flex-end;
    }

    .logo img {
        height: 28px;
    }

    #map-wrapper iframe {
        height: 100vh !important;
    }
}

/* 🔥 FORCE ZOOM CONTROL BOTTOM LEFT */
.leaflet-control-zoom {
    position: absolute !important;
    left: 12px !important;
    bottom: 12px !important;
}

</style>
</head>

<body>

<div class="page-wrapper">
    <div class="map-card">

        <!-- LOGO -->
        <div class="logo">
            <img src="/static/images/VitalitySeaWaysLLP.png">
        </div>

        <!-- BUTTONS -->
        <div class="top-buttons">
            <button onclick="alert('Dashboard')">Dashboard</button>
            <button onclick="window.location.href='{% url 'allmaps' %}'">MAP</button>
            <button onclick="alert('Vessels')">Vessels</button>
            <button onclick="alert('Alert')">Alert</button>
            <button onclick="window.location.href='{% url 'login' %}'">Login</button>
        </div>

        <!-- MAP -->
        <div id="map-wrapper">
            {{ map_html|safe }}
        </div>

    </div>
</div>

<script>
function fixMap() {
    const iframe = document.querySelector('#map-wrapper iframe');
    if (iframe) {
        iframe.style.height = window.innerHeight + "px";
        iframe.style.width = "100%";
    }
}
window.addEventListener("load", fixMap);
window.addEventListener("resize", fixMap);
</script>

</body>
</html>
